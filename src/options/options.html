<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>skeeditor settings</title>
    <link rel="stylesheet" href="/global.css" />
  </head>

  <body class="m-0 min-h-screen bg-gray-900 text-gray-100">
    <main class="mx-auto max-w-2xl p-6 space-y-6">
      <h1 class="mb-1 text-2xl font-bold text-white">skeeditor settings</h1>
      <p id="status" class="text-sm text-blue-400 min-h-5"></p>

      <!-- ── Accounts ──────────────────────────────────────────────────── -->
      <div
        class="divide-y divide-gray-200 overflow-hidden rounded-lg bg-white shadow-sm dark:divide-white/10 dark:bg-gray-800/50 dark:shadow-none dark:outline dark:-outline-offset-1 dark:outline-white/10"
      >
        <div class="px-4 py-5 sm:px-6">
          <h2 class="text-base font-semibold text-gray-900 dark:text-white">Accounts</h2>
        </div>

        <!-- Account list -->
        <div class="px-4 py-5 sm:p-6 space-y-3">
          <div id="accounts-list" class="space-y-2">
            <p class="text-sm text-gray-500 dark:text-gray-400">Loading accounts…</p>
          </div>
        </div>

        <!-- Add account -->
        <div class="px-4 py-5 sm:p-6 space-y-4">
          <h3 class="text-sm font-semibold text-gray-900 dark:text-white">Add account</h3>
          <div>
            <label for="add-pds-url" class="block text-sm/6 font-medium text-gray-900 dark:text-gray-100"
              >PDS URL</label
            >
            <div class="mt-2">
              <input
                type="url"
                id="add-pds-url"
                value="https://bsky.social"
                placeholder="https://bsky.social"
                class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6 dark:bg-white/5 dark:text-white dark:outline-white/10 dark:placeholder:text-gray-500 dark:focus:outline-indigo-500"
              />
            </div>
          </div>
          <button
            id="add-account"
            type="button"
            class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-xs inset-ring inset-ring-gray-300 hover:bg-gray-50 dark:bg-white/10 dark:text-white dark:shadow-none dark:inset-ring-white/5 dark:hover:bg-white/20"
          >
            Add account
          </button>
        </div>
      </div>

      <!-- ── Extension Settings ──────────────────────────────────────────── -->
      <div
        class="divide-y divide-gray-200 overflow-hidden rounded-lg bg-white shadow-sm dark:divide-white/10 dark:bg-gray-800/50 dark:shadow-none dark:outline dark:-outline-offset-1 dark:outline-white/10"
      >
        <div class="px-4 py-5 sm:px-6">
          <h2 class="text-base font-semibold text-gray-900 dark:text-white">Extension Settings</h2>
        </div>
        <div class="space-y-4 px-4 py-5 sm:p-6">
          <div>
            <label for="edit-time-limit" class="block text-sm/6 font-medium text-gray-900 dark:text-gray-100">
              Edit time limit (minutes)
            </label>
            <div class="mt-2">
              <input
                type="number"
                id="edit-time-limit"
                min="0.5"
                max="5"
                step="0.5"
                placeholder="Leave blank to disable"
                class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6 dark:bg-white/5 dark:text-white dark:outline-white/10 dark:placeholder:text-gray-500 dark:focus:outline-indigo-500"
              />
            </div>
          </div>
          <p class="text-sm text-gray-500 dark:text-gray-400">
            Leave blank to disable. When set, posts older than the configured window cannot be edited.
          </p>
          <div>
            <button
              id="save-settings"
              type="button"
              class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-indigo-500 dark:shadow-none dark:hover:bg-indigo-400 dark:focus-visible:outline-indigo-500"
            >
              Save Settings
            </button>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="./options.ts"></script>
  </body>
</html>
