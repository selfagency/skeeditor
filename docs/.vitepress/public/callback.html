<!DOCTYPE html>
<html>

<head>
  <title>skeeditor - OAuth Callback</title>
  <script>
    // Parse the URL parameters
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');

    // Send the authorization code back to the extension if opened via window.open().
    // In the normal extension flow the background service worker intercepts this navigation
    // via tabs.onUpdated and closes the tab automatically; this postMessage path is a
    // fallback for development/testing only.
    if (code && state) {
      if (window.opener) {
        window.opener.postMessage({
          type: 'AUTH_CALLBACK',
          code: code,
          state: state
        }, '*');
        window.close();
      }
      // Otherwise the extension background will close this tab momentarily.
    } else {
      document.body.innerHTML = '<h1>Error: Missing authorization code</h1>';
    }
  </script>
</head>

<body>
  <h1>Authentication complete. You can close this window.</h1>
</body>

</html>
