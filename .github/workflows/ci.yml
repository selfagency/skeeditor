name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Weekly full-matrix run every Monday at 04:00 UTC
    - cron: '0 4 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: task install:ci

      - name: Check formatting
        run: task format:check

      - name: Lint sources
        run: task lint

      - name: Type-check project
        run: task typecheck

      - name: Validate cross-browser parity manifest
        run: task test:parity

  tests:
    name: Unit, integration tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: task install:ci

      - name: Run tests with coverage and JUnit output
        run: task test:coverage:ci

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            coverage/**
            test-report.junit.xml
          if-no-files-found: error

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ env.CODECOV_TOKEN }}

  build:
    name: Build extension artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: task install:ci

      - name: Build extension (all browsers)
        run: task build:chrome && task build:firefox

      - name: Copy browser manifests
        run: |
          cp dist/chrome/manifest.json /tmp/chrome-manifest.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: dist
          if-no-files-found: error

  e2e-chromium:
    name: Playwright Chromium E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - quality
      - tests
      - build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: task install:ci

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm list @playwright/test --json | jq -r '.[0].dependencies["@playwright/test"].version')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v${{ steps.pw-version.outputs.version }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium with system dependencies
        run: task playwright:install:chromium

      - name: Download built extension artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-dist
          path: dist

      - name: Run Chromium extension smoke tests
        run: task test:e2e:chromium

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-chromium-failure-${{ github.run_id }}
          path: |
            test-results/**
            playwright-report/**
          retention-days: 14

  e2e-firefox-webext:
    name: Firefox web-ext smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - quality
      - build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: task install:ci

      - name: Install Firefox (Playwright runtime)
        run: task playwright:install:firefox

      - name: Download built extension artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-dist
          path: dist

      - name: Run Firefox web-ext smoke test
        run: task test:e2e:firefox
        env:
          # Use Playwright-managed Firefox on Linux CI; no Dev Edition available
          FIREFOX_BINARY: ''

  e2e-chromium-devnet:
    name: Playwright Chromium E2E (devnet)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - quality
      - tests
      - build
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: task install:ci

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm list @playwright/test --json | jq -r '.[0].dependencies["@playwright/test"].version')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v${{ steps.pw-version.outputs.version }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium with system dependencies
        run: task playwright:install:chromium

      - name: Download built extension artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-dist
          path: dist

      - name: Start devnet stack
        run: task devnet:up

      - name: Run Chromium devnet E2E tests
        run: task test:e2e:chromium:devnet

      - name: Stop devnet stack
        if: always()
        run: task devnet:down

  e2e-firefox-devnet:
    name: Playwright Firefox E2E (devnet)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - quality
      - tests
      - build
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: task install:ci

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm list @playwright/test --json | jq -r '.[0].dependencies["@playwright/test"].version')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-firefox-${{ runner.os }}-v${{ steps.pw-version.outputs.version }}
          restore-keys: playwright-firefox-${{ runner.os }}-

      - name: Install Playwright Firefox with system dependencies
        run: task playwright:install:firefox

      - name: Download built extension artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-dist
          path: dist

      - name: Start devnet stack
        run: task devnet:up

      - name: Run Firefox devnet E2E tests
        run: task test:e2e:firefox:devnet
        env:
          FIREFOX_EXTENSION_E2E: '1'

      - name: Stop devnet stack
        if: always()
        run: task devnet:down

  release-smoke:
    name: Release automation smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push'
    needs:
      - quality
      - build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: task install:ci

      - name: Smoke-test release script (dry-run)
        run: task release:smoke

      - name: Upload release smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-ci
          path: release-artifacts-ci/**
          if-no-files-found: error
